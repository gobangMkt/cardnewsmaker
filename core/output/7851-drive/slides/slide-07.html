<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute;
    width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:center; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .hl-text {
    font-weight:800; font-size:57.61px; line-height:68.78px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED; flex-shrink:0;
  }
  .paragraphs {
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
    width:936.08px;
  }
  .paragraph {
    display:flex; flex-direction:column; align-items:flex-start; gap:18.1px;
    width:936.08px;
  }
  .item-row {
    display:flex; flex-direction:row; align-items:center; gap:18.1px;
    width:936.08px;
  }
  .rank-badge {
    min-width:81.45px; height:65.16px;
    background:rgba(0,154,181,0.2); border-radius:18.1px;
    display:inline-flex; align-items:center; justify-content:center;
    padding:0 16px; flex-shrink:0;
    font-weight:700; font-size:43.44px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .group-title {
    font-weight:700; font-size:43.44px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .body {
    width:936.08px;
    font-weight:400; font-size:43.44px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">✅</div>
      <div class="hl-text">슬세권 체크리스트예요</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraphs">
      <div class="paragraph">
        <div class="item-row">
          <span class="rank-badge">1</span>
          <span class="group-title">도보 5분 편의점</span>
        </div>
        <div class="body"><span class="highlight">24시간</span> 편의점이 도보 5분 이내에 있는지 확인해요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <span class="rank-badge">2</span>
          <span class="group-title">다이소·올리브영·약국 도보권</span>
        </div>
        <div class="body">배송 없이 <span class="highlight">즉시</span> 생활용품·뷰티·의약품을 해결해요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <span class="rank-badge">3</span>
          <span class="group-title">헬스장·필라테스 접근성</span>
        </div>
        <div class="body">가까울수록 <span class="highlight">운동 루틴</span>이 오래 지속돼요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <span class="rank-badge">4</span>
          <span class="group-title">밤 안전 동선</span>
        </div>
        <div class="body">밤 조명·골목 구조를 <span class="highlight">낮과 밤 모두</span> 확인해요.</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
