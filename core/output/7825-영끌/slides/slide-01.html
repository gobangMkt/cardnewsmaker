<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative;
    width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#FFFFFF;
  }
  .bg-img {
    position:absolute;
    width:1978.27px; height:1380.34px;
    left:calc(50% - 989.135px + 69.96px);
    top:-30.01px;
    object-fit:cover;
  }
  .gradient {
    position:absolute;
    width:1080px; height:1350px;
    left:0; top:0;
    background:linear-gradient(180deg, rgba(30,33,36,0.9) 8.3%, rgba(30,33,36,0) 44.3%);
    transform:rotate(-180deg);
  }
  .key-gradient {
    position:absolute;
    width:1080px; height:280px;
    left:0; bottom:0;
    background:linear-gradient(to top, rgba(239,68,82,0.85) 0%, rgba(239,68,82,0.3) 50%, rgba(239,68,82,0) 100%);
    z-index:1;
  }
  .headline {
    position:absolute;
    width:960.09px; height:271.5px;
    left:47.99px; top:870.18px;
    font-family:'Pretendard';
    font-weight:700;
    font-size:100.02px;
    line-height:135%;
    letter-spacing:-0.05em;
    color:#FFFFFF;
    border:3px solid #000000;
    z-index:2;
  }
  .headline .key { color:#EF4452; }
  .logo-frame {
    position:absolute;
    width:150px; height:44px;
    left:calc(50% - 75px);
    top:1262px;
    display:flex; align-items:center; justify-content:center;
    z-index:3;
  }
  .logo-img { height:36px; width:auto; }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg-img" src="https://image.neoflat.net/UfcnRfyY3eoIaNINa1DJJnal0R8=/1440x400/filters:no_upscale()/community/7825/e18678f5-7f6c-4025-91e9-8052d857c8bc.jpg" alt="">
  <div class="gradient"></div>
  <div class="key-gradient"></div>
  <div class="headline">고금리에도 30대<br>서울 영끌 <span class="key">60%</span> 육박</div>
  <div class="logo-frame">
    <img class="logo-img" src="../../../templates/피그마 ref/logo.png" alt="고방">
  </div>
</div>
</body>
</html>
