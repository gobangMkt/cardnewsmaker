<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group { position:absolute; width:935.77px; height:934.56px; left:71.68px; top:86.88px; display:flex; flex-direction:column; align-items:flex-start; gap:57.61px; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:63.35px; width:935.77px; }
  .body-text { width:935.77px; font-weight:400; font-size:43.21px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .callout { width:935.77px; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:43.21px 43.21px 46.81px; gap:14.41px; background:#E6F5EC; border-radius:21.6px; }
  .callout-title { display:flex; flex-direction:row; align-items:center; gap:14.41px; width:100%; }
  .callout-check { width:50.41px; height:50.41px; flex-shrink:0; background:#29BA66; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#FFFFFF; font-size:28px; font-weight:700; }
  .callout-title-text { font-weight:700; font-size:38.71px; line-height:160%; letter-spacing:-0.02em; color:#1E2124; }
  .callout-body { width:100%; padding-left:10.8px; font-weight:700; font-size:39.61px; line-height:160%; letter-spacing:-0.02em; color:#1E2124; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; flex-direction:row; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="paragraph">
      <div class="body-text">고금리 속에서도 서울 아파트 생애최초 매수에 나선 30대의 현황과 이유를 알아봤는데요.</div>
      <div class="body-text">전세 불안·정책대출·결혼 수요가 맞물리며 30대 매수가 늘었지만, 정책대출 자격 ≠ 감당 가능인 만큼 꼼꼼한 계산이 필요해요.</div>
      <div class="callout">
        <div class="callout-title">
          <div class="callout-check">✓</div>
          <div class="callout-title-text">고방에서 확인하세요</div>
        </div>
        <div class="callout-body">[프로필 링크]-[고방 바로가기]에서 내게 맞는 주거 유형을 찾아보세요!</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
