<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:flex-start; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0;
  }
  .paragraph {
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
    width:936.08px;
  }
  .body-text {
    width:936.08px; font-weight:400; font-size:43.44px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .body-bold {
    width:936.08px; font-weight:700; font-size:43.44px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .info-card {
    width:936.08px;
    display:flex; flex-direction:column; gap:0;
    border-radius:21.6px; overflow:hidden;
    border:1.8px solid #DAE2ED;
  }
  .info-row {
    display:flex; flex-direction:row; align-items:stretch;
    border-top:1.8px solid #DAE2ED;
  }
  .info-row:first-child { border-top:none; }
  .info-label {
    width:220px; flex-shrink:0;
    padding:30px 28px;
    background:#1E2124;
    font-weight:700; font-size:36px; line-height:1.4;
    letter-spacing:-0.02em; color:#FFFFFF;
    display:flex; align-items:center;
  }
  .info-value {
    flex:1; padding:30px 28px;
    background:#FFFFFF;
    font-weight:400; font-size:39px; line-height:1.5;
    letter-spacing:-0.02em; color:#1E2124;
    display:flex; align-items:center;
  }
  .info-value strong { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">🙋</div>
      <div class="headline-text">나도 받을 수 있어요?</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraph">
      <p class="body-text"><span class="highlight">딱 한 가지 조건</span>이에요. 기후동행카드를 처음 구매해서 <span class="highlight">30일권을 충전·사용</span>한 신규 이용자면 누구나 해당돼요.</p>
      <div class="info-card">
        <div class="info-row">
          <div class="info-label">대상</div>
          <div class="info-value">기후동행카드 <strong>신규 이용자</strong></div>
        </div>
        <div class="info-row">
          <div class="info-label">조건</div>
          <div class="info-value"><strong>30일권</strong> 충전 후 실제 이용</div>
        </div>
        <div class="info-row">
          <div class="info-label">기간</div>
          <div class="info-value"><strong>4월 1일~4월 30일</strong> 내 충전</div>
        </div>
        <div class="info-row">
          <div class="info-label">카드</div>
          <div class="info-value">실물카드 또는 모바일(안드로이드)</div>
        </div>
      </div>
      <p class="body-text">기존 이용자나 30일권이 아닌 권종은 해당되지 않아요.</p>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
