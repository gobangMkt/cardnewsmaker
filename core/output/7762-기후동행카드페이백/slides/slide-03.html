<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:57.92px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:flex-start; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0;
  }
  .table-wrap {
    width:936.08px;
    display:flex; flex-direction:column; gap:0;
    border-radius:21.6px; overflow:hidden;
    border:1.8px solid #DAE2ED;
  }
  .table-header {
    display:flex; flex-direction:row;
    background:#1E2124;
  }
  .th {
    flex:1; padding:30px 24px;
    font-weight:700; font-size:36px; line-height:1.3;
    letter-spacing:-0.02em; color:#FFFFFF; text-align:center;
  }
  .th.wide { flex:1.4; }
  .table-row {
    display:flex; flex-direction:row;
    border-top:1.8px solid #DAE2ED;
    background:#FFFFFF;
  }
  .table-row:nth-child(even) { background:#F8FAFD; }
  .td {
    flex:1; padding:32px 24px;
    font-weight:400; font-size:39px; line-height:1.4;
    letter-spacing:-0.02em; color:#1E2124; text-align:center;
  }
  .td.wide { flex:1.4; }
  .td.bold { font-weight:700; }
  .td.accent { color:#009AB5; font-weight:700; font-size:43px; }
  .body-text {
    width:936.08px; font-weight:400; font-size:39px; line-height:140%;
    letter-spacing:-0.02em; color:#6B7684;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">💸</div>
      <div class="headline-text">얼마나 돌려줘요?</div>
    </div>
    <div class="content-divider"></div>
    <div class="table-wrap">
      <div class="table-header">
        <div class="th wide">권종</div>
        <div class="th">충전금액</div>
        <div class="th">페이백</div>
      </div>
      <div class="table-row">
        <div class="td wide bold">일반</div>
        <div class="td">62,000원</div>
        <div class="td accent">6,200원</div>
      </div>
      <div class="table-row">
        <div class="td wide bold">청년·청소년<br>두자녀</div>
        <div class="td">55,000원</div>
        <div class="td accent">5,500원</div>
      </div>
      <div class="table-row">
        <div class="td wide bold">세자녀·저소득</div>
        <div class="td">45,000원</div>
        <div class="td accent">4,500원</div>
      </div>
    </div>
    <p class="body-text">충전금액의 <span class="highlight">10%</span>를 티머니 마일리지로 지급해요. 마일리지는 6월에 일괄 지급돼요.</p>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
