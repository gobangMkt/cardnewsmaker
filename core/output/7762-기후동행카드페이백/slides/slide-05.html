<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:flex-start; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0;
  }
  .paragraphs {
    display:flex; flex-direction:column; gap:43.44px; width:936.08px;
  }
  .card {
    width:936.08px;
    background:#FFFFFF; border:1.8px solid #DAE2ED;
    border-radius:21.6px; padding:43px 43px 46px;
    display:flex; flex-direction:column; gap:20px;
  }
  .card-title {
    display:flex; align-items:center; gap:16px;
  }
  .card-badge {
    background:#1E2124; border-radius:12px;
    padding:6px 20px;
    font-weight:700; font-size:34px; color:#FFFFFF; letter-spacing:-0.02em;
  }
  .card-label {
    font-weight:700; font-size:43.44px; line-height:1.3;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .card-body {
    font-weight:400; font-size:39px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .tag {
    display:inline-block; background:rgba(239,68,82,0.12);
    border-radius:10px; padding:2px 14px;
    font-weight:700; font-size:34px; color:#EF4452; letter-spacing:-0.02em;
  }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">🪪</div>
      <div class="headline-text">카드 발급은 이렇게</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraphs">
      <div class="card">
        <div class="card-title">
          <div class="card-badge">실물카드</div>
          <div class="card-label">역사·편의점에서 구매</div>
        </div>
        <div class="card-body">지하철 역사 내 무인발급기나 편의점에서 바로 살 수 있어요. 구매 후 단말기에서 <span class="highlight">30일권 충전</span>하면 끝이에요.</div>
      </div>
      <div class="card">
        <div class="card-title">
          <div class="card-badge">모바일</div>
          <div class="card-label">티머니 앱에서 발급</div>
        </div>
        <div class="card-body">티머니 앱을 설치하고 기후동행카드를 발급받아요. 신용카드 또는 계좌이체로 충전 가능해요.<br><span class="tag">안드로이드 전용</span> iOS는 미지원이에요.</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
