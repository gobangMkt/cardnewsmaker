<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#1E2124;
  }
  .bg-pattern {
    position:absolute; width:1080px; height:1350px; left:0; top:0;
    background:
      radial-gradient(ellipse 800px 600px at 60% 30%, rgba(0,154,181,0.28) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 10% 80%, rgba(0,154,181,0.15) 0%, transparent 60%),
      linear-gradient(160deg, #1E2124 0%, #0f1820 100%);
  }
  .accent-bar {
    position:absolute;
    left:72px; top:96px;
    width:9px; height:130px;
    background:#009AB5;
    border-radius:4px;
  }
  .label {
    position:absolute;
    left:100px; top:100px;
    font-weight:700; font-size:38px; line-height:1.3;
    letter-spacing:-0.02em; color:rgba(255,255,255,0.55);
  }
  .headline {
    position:absolute;
    width:936px;
    left:72px; top:900px;
    display:flex; flex-direction:column; align-items:flex-start;
    z-index:2;
  }
  .hl-line {
    width:936px; height:136px;
    font-weight:700; font-size:100px;
    line-height:135%; letter-spacing:-0.05em; color:#FFFFFF;
    -webkit-text-stroke:4px #000000; paint-order:stroke fill;
    display:flex; align-items:center;
  }
  .hl-line .key { color:#00FFFF; }
  .logo-frame {
    position:absolute;
    width:150px; height:44px;
    left:calc(50% - 75px); top:1262px;
    display:flex; align-items:center; justify-content:center;
    z-index:3;
  }
  .logo-img { height:36px; width:auto; }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-pattern"></div>
  <div class="accent-bar"></div>
  <div class="label">기후동행카드</div>
  <div class="headline">
    <div class="hl-line">대중교통 타면</div>
    <div class="hl-line"><span class="key">6,200원 돌려줌</span></div>
  </div>
  <div class="logo-frame">
    <img class="logo-img" src="../../../templates/피그마 ref/logo.png" alt="고방">
  </div>
</div>
</body>
</html>
