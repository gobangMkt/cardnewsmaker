<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; align-items:flex-start; gap:57.92px; }
  .headline { display:flex; flex-direction:row; align-items:flex-start; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .headline-text { font-weight:800; font-size:57.61px; line-height:1.2; letter-spacing:-0.02em; color:#1E2124; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:57.92px; width:936.08px; }
  .body-text { width:936.08px; font-weight:400; font-size:43.44px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .cell-img { width:924.91px; height:423.54px; border-radius:27.15px; object-fit:cover; background:#D9D9D9; flex-shrink:0; }
  .bullets { display:flex; flex-direction:column; gap:9.05px; width:936.08px; padding-left:18.1px; }
  .bullet-item { position:relative; padding-left:32.41px; font-weight:400; font-size:39.61px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .bullet-item::before { content:'•'; position:absolute; left:0; top:0; font-weight:700; color:#1E2124; }
  .bullet-item b { font-weight:700; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; flex-direction:row; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">🛒</div>
      <div class="headline-text">어디서, 언제까지 써야 해요?</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraph">
      <p class="body-text">받은 지원금은 아무 곳에서나 쓸 수 있는 게 아니에요. <span class="highlight">서울시 소재 연 매출 30억 원 이하 소상공인 업체</span>에서만 사용 가능하고, 대형마트·백화점·유흥업소는 제외돼요.</p>
      <img class="cell-img" src="../img/9608972f-afc2-45f5-aab2-bc6eba5add1e.webp" alt="">
      <div class="bullets">
        <div class="bullet-item"><b>사용 가능 지역:</b> 서울시 전역</div>
        <div class="bullet-item"><b>사용 기한:</b> <span class="highlight">1차·2차 모두 2026.8.31까지</span></div>
        <div class="bullet-item"><b>사용 제한:</b> 대형마트·백화점·유흥·사행업종</div>
        <div class="bullet-item"><b>잔액 처리:</b> 기한 후 자동 소멸</div>
      </div>
      <p class="body-text">기한 안에 쓰지 않은 금액은 자동으로 사라져요. <span class="highlight">받는 것만큼 어디서 쓸지 미리 정해두는 게 중요</span>해요.</p>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
