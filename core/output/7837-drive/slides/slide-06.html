<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .outer { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; align-items:flex-start; gap:45.25px; }
  .headline { display:flex; flex-direction:row; align-items:center; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .hl-text { font-weight:800; font-size:57.61px; line-height:68.78px; letter-spacing:-0.02em; color:#1E2124; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0; }
  .slide-img { width:934px; height:423.54px; border-radius:27.15px; object-fit:cover; background:#D9D9D9; flex-shrink:0; }
  .content-group { display:flex; flex-direction:column; align-items:flex-start; gap:20px; width:933.96px; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:18.1px; width:933.96px; }
  .item-row { display:flex; flex-direction:row; align-items:center; gap:18.1px; }
  .rank-badge { min-width:81.45px; height:65.16px; background:rgba(0,154,181,0.2); border-radius:18.1px; display:inline-flex; align-items:center; justify-content:center; padding:0 16px; font-weight:700; font-size:43.44px; letter-spacing:-0.02em; color:#1E2124; }
  .group-title { font-weight:700; font-size:43.44px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .body { width:933.96px; font-weight:400; font-size:43.44px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .bullets { display:flex; flex-direction:column; gap:9.05px; width:933.96px; padding-left:18.1px; }
  .bullet-item { position:relative; padding-left:32.41px; font-weight:400; font-size:39.61px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .bullet-item::before { content:'•'; position:absolute; left:0; top:0; font-weight:700; color:#1E2124; }
  .bullet-item b { font-weight:700; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; flex-direction:row; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="outer">
    <div class="headline">
      <div class="hl-icon">📱</div>
      <div class="hl-text">신청은 어떻게 해요?</div>
    </div>
    <div class="content-divider"></div>
    <img class="slide-img" src="../img/8eb77f7a-ae92-4696-8706-9520bfc5c434.webp" alt="">
    <div class="content-group">
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">온라인</div>
          <div class="group-title">카드사 앱·누리집·ARS</div>
        </div>
        <div class="body">카드사 앱이나 누리집, 콜센터·ARS로 신청하거나 <span class="highlight">연계 은행 영업점을 방문</span>해도 돼요. 모바일 서울사랑상품권은 서울페이플러스 앱에서 신청해요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">오프라인</div>
          <div class="group-title">동주민센터 방문</div>
        </div>
        <div class="body"><span class="highlight">선불카드</span>는 주소지 관할 동주민센터에서 신청해요. 성인은 직접 신청이 원칙이고, 미성년자는 동일 주소지 세대주가 신청할 수 있어요.</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
