<style>

  }
  .hl-icon {

    display:flex; align-items:center; justify-content:center;

  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;

  .paragraph {

    object-fit:cover;

    left:72.02px; bottom:66.61px;
