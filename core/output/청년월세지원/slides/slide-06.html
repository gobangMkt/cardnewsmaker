<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    width:597px; height:746px; overflow:hidden; word-break:keep-all;
    background:#ffffff; position:relative;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  }
  .content { position:absolute; top:48px; left:40px; right:40px; }
  .body-text { font-size:24px; font-weight:400; color:#1e2124; line-height:1.75; letter-spacing:-0.48px; margin-bottom:24px; }
  .body-text b { font-weight:700; }
  .footer { position:absolute; bottom:0; left:40px; right:40px; height:56px; display:flex; align-items:center; border-top:1px solid #dae2ed; }
  .footer-text { font-size:21px; font-weight:500; color:#1e2124; letter-spacing:-0.42px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content">
    <p class="body-text">
      오늘은 2025년 청년 월세지원 정책에 대해 알아봤는데요. <b>만 19~34세 무주택 청년</b>이라면 월 최대 20만 원씩, 최대 24개월 동안 지원받을 수 있어요.
    </p>
    <p class="body-text">
      현재 신청 기간은 <b>3월 30일~5월 29일</b>까지로, 온라인(복지로)이나 주민센터에서 신청 가능합니다. 결과는 9월에 발표되며, 5월분부터 소급 지급돼요.
    </p>
    <p class="body-text">
      만약, 주거 비용 부담을 줄이고 나의 생활 패턴에 맞는 주거 공간을 선택하고 싶다면 <b>고방에서 다양한 주거 유형을 찾아보세요!</b>
    </p>
  </div>
  <div class="footer"><span class="footer-text">시리즈픽</span></div>
</div>
</body>
</html>
