<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    width:597px; height:746px; overflow:hidden; word-break:keep-all;
    background:#f8fafd; position:relative;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  }
  .content { position:absolute; top:64px; left:40px; right:40px; display:flex; flex-direction:column; gap:24px; }
  .headline { display:flex; align-items:center; gap:8px; }
  .icon { font-size:32px; }
  .hl { font-size:32px; font-weight:800; color:#1e2124; letter-spacing:-0.64px; white-space:nowrap; }
  .hl-badge { background:rgba(239,68,82,0.3); border-radius:10px; padding:2px 10px; }
  .group { display:flex; flex-direction:column; gap:10px; }
  .rank-badge {
    display:inline-flex; align-items:center; justify-content:center;
    background:rgba(239,68,82,0.3); border-radius:10px;
    width:45px; height:36px; font-size:22px; font-weight:700; color:#ef4452; letter-spacing:-0.44px; flex-shrink:0;
  }
  .group-title { font-size:24px; font-weight:700; color:#1e2124; letter-spacing:-0.48px; line-height:1.5; }
  ul { list-style:disc; padding-left:28px; display:flex; flex-direction:column; gap:2px; }
  ul li { font-size:24px; font-weight:400; color:#1e2124; letter-spacing:-0.48px; line-height:1.5; }
  .divider { height:1px; background:#dae2ed; }
  .footer { position:absolute; bottom:0; left:40px; right:40px; height:56px; display:flex; align-items:center; border-top:1px solid #dae2ed; }
  .footer-text { font-size:21px; font-weight:500; color:#1e2124; letter-spacing:-0.42px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content">
    <div class="headline">
      <span class="icon">🔥</span>
      <div class="hl">이런 청년이라면&nbsp;<span class="hl-badge">신청하세요</span></div>
    </div>
    <div class="group">
      <div class="rank-badge">기본</div>
      <div class="group-title">기본 조건</div>
      <ul>
        <li>만 19세~34세 청년</li>
        <li>부모와 별도 거주 (독립 거주)</li>
        <li>무주택자</li>
      </ul>
    </div>
    <div class="divider"></div>
    <div class="group">
      <div class="rank-badge">소득</div>
      <div class="group-title">소득·자산 기준</div>
      <ul>
        <li>청년가구 소득: 중위소득 60% 이하</li>
        <li>청년 자산: 1억 2,200만 원 이하</li>
        <li>원가구 소득: 중위소득 100% 이하</li>
        <li>원가구 자산: 4억 7,000만 원 이하</li>
      </ul>
    </div>
  </div>
  <div class="footer"><span class="footer-text">시리즈픽</span></div>
</div>
</body>
</html>
