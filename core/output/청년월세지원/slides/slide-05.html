<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    width:597px; height:746px; overflow:hidden; word-break:keep-all;
    background:#f8fafd; position:relative;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  }
  .content { position:absolute; top:64px; left:40px; right:40px; bottom:72px; display:flex; flex-direction:column; gap:20px; }
  .headline { display:flex; align-items:center; gap:10px; }
  .icon-box { width:36px; height:36px; background:#e8edf2; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .headline-text { font-size:32px; font-weight:800; color:#1e2124; letter-spacing:-0.64px; }
  .body-text { font-size:24px; font-weight:400; color:#1e2124; line-height:1.65; letter-spacing:-0.48px; }
  .body-text em { font-style:normal; color:#ef4452; font-weight:700; }
  .num-list { display:flex; flex-direction:column; gap:10px; }
  .num-item { font-size:24px; line-height:1.6; letter-spacing:-0.48px; color:#1e2124; }
  .num-item b { font-weight:700; }
  .callout { background:#e8f5ee; border-radius:14px; padding:20px 22px; margin-top:auto; }
  .callout-title { display:flex; align-items:center; gap:8px; font-size:24px; font-weight:700; color:#1e2124; letter-spacing:-0.48px; margin-bottom:8px; }
  .callout-check { width:28px; height:28px; background:#34a853; border-radius:6px; display:flex; align-items:center; justify-content:center; color:white; font-size:16px; flex-shrink:0; }
  .callout-body { font-size:22px; font-weight:400; color:#1e2124; line-height:1.5; letter-spacing:-0.44px; padding-left:36px; }
  .footer { position:absolute; bottom:0; left:40px; right:40px; height:56px; display:flex; align-items:center; border-top:1px solid #dae2ed; }
  .footer-text { font-size:21px; font-weight:500; color:#1e2124; letter-spacing:-0.42px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content">
    <div class="headline">
      <div class="icon-box">⚠️</div>
      <div class="headline-text">이런 경우 탈락해요</div>
    </div>
    <p class="body-text">
      신청 전 반드시 확인하세요. 아래 항목에 해당하면 <em>탈락</em>할 수 있어요.
    </p>
    <div class="num-list">
      <div class="num-item"><b>1. 부모와 함께 거주:&nbsp;</b>독립 거주가 아닌 경우 신청 불가</div>
      <div class="num-item"><b>2. 자산 기준 초과:&nbsp;</b>청년 자산 1억 2,200만 원 초과 시</div>
      <div class="num-item"><b>3. 서류 누락:&nbsp;</b>임대차계약서, 소득 증빙 등 미제출</div>
      <div class="num-item"><b>4. 정보 오류:&nbsp;</b>신청서 입력 실수 또는 정보 불일치</div>
    </div>
    <div class="callout">
      <div class="callout-title">
        <div class="callout-check">✓</div>
        신청 전 꼭 확인하세요!
      </div>
      <div class="callout-body">서류를 꼼꼼히 준비하고 정보를 정확하게 입력해야 탈락을 막을 수 있어요.</div>
    </div>
  </div>
  <div class="footer"><span class="footer-text">시리즈픽</span></div>
</div>
</body>
</html>
