<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; gap:43.44px;
  }
  .headline { display:flex; align-items:flex-start; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .headline-text { font-weight:800; font-size:57.61px; line-height:1.2; letter-spacing:-0.02em; color:#1E2124; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; }
  .role-tag {
    display:inline-flex; align-items:center; padding:10px 22px;
    background:#009AB5; border-radius:40px;
    font-weight:700; font-size:36px; color:#FFFFFF; letter-spacing:-0.02em;
  }
  .qa-list { display:flex; flex-direction:column; gap:21.6px; }
  .qa-item { display:flex; flex-direction:column; gap:0; border-radius:21.6px; overflow:hidden; border:1.8px solid #DAE2ED; }
  .qa-q {
    padding:22px 28px; background:#1E2124;
    font-weight:700; font-size:36px; line-height:1.4;
    letter-spacing:-0.02em; color:#FFFFFF;
  }
  .qa-a {
    padding:22px 28px; background:#FFFFFF;
    font-weight:400; font-size:36px; line-height:1.5;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .qa-a strong { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">🙋</div>
      <div class="headline-text">세입자라면?</div>
    </div>
    <div class="content-divider"></div>
    <div class="qa-list">
      <div class="qa-item">
        <div class="qa-q">계약 갱신을 앞두고 있어요</div>
        <div class="qa-a">기준 시행 전 계약이면 기존 보증 유지 가능. <strong>신규 갱신 시 기준 재적용</strong> 여부는 시행 시점 확인 필요</div>
      </div>
      <div class="qa-item">
        <div class="qa-q">지금 전세가율이 75%예요</div>
        <div class="qa-a">기준이 70%로 바뀌면 <strong>신규 보증 가입 불가</strong>. 보증금 감액 협의하거나 다른 보증상품 검토 필요</div>
      </div>
      <div class="qa-item">
        <div class="qa-q">보증 없이 계약하면 어떻게 되나요?</div>
        <div class="qa-a">집주인 부도 시 보증금 회수 어려움. <strong>보증 가입 가능한 매물로 이사</strong>를 고려하는 게 안전해요</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
