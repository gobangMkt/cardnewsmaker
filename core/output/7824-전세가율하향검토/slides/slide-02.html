<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px; height:auto;
    left:72.02px; top:86.88px;
    display:flex; flex-direction:column; gap:57.61px;
  }
  .paragraph { display:flex; flex-direction:column; gap:63.35px; width:936.08px; }
  .body-text {
    width:936.08px; font-weight:400; font-size:43.44px; line-height:130%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="paragraph">
      <p class="body-text">전세보증금 반환보증, 가입하면 집주인이 보증금을 못 돌려줘도 HUG가 대신 보전해줘요. 그래서 전세 계약할 때 '보증 가입 가능 여부'가 필수 체크 항목이 됐어요.</p>
      <p class="body-text">그런데 이 보증에 <span class="highlight">가입할 수 있는 조건이 더 까다로워질 수 있어요.</span> 현행 90%인 전세가율 기준을 <span class="highlight">70%까지 낮추는 방안</span>이 검토 중이에요.</p>
      <p class="body-text">오늘은 이 변화가 세입자와 집주인에게 각각 어떤 영향을 주는지 정리해볼게요.</p>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
