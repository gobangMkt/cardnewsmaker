<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#1E2124;
  }
  .bg-pattern {
    position:absolute; width:1080px; height:1350px; left:0; top:0;
    background:
      radial-gradient(ellipse 600px 400px at 80% 20%, rgba(0,154,181,0.18) 0%, transparent 65%),
      radial-gradient(ellipse 350px 300px at 10% 80%, rgba(0,154,181,0.10) 0%, transparent 60%),
      linear-gradient(150deg, #1E2124 0%, #111820 100%);
  }
  .content-group {
    position:absolute; width:936.08px;
    left:72.02px; top:130px;
    display:flex; flex-direction:column; gap:57.61px; z-index:2;
  }
  .label-tag {
    display:inline-flex; align-items:center; padding:10px 22px;
    background:rgba(0,154,181,0.25); border:1.5px solid rgba(0,154,181,0.5);
    border-radius:40px;
    font-weight:700; font-size:34px; color:#009AB5; letter-spacing:-0.02em;
  }
  .summary-title {
    font-weight:800; font-size:64px; line-height:1.2;
    letter-spacing:-0.03em; color:#FFFFFF;
  }
  .summary-title .key { color:#00FFFF; }
  .summary-list { display:flex; flex-direction:column; gap:18px; }
  .summary-item {
    display:flex; align-items:flex-start; gap:18px;
    padding:28px 28px; background:rgba(255,255,255,0.06);
    border:1.5px solid rgba(255,255,255,0.12); border-radius:21.6px;
  }
  .s-num {
    width:50px; height:50px; flex-shrink:0; border-radius:50%;
    background:#009AB5; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:28px; color:#FFFFFF; margin-top:4px;
  }
  .s-text {
    font-weight:400; font-size:38px; line-height:1.5;
    letter-spacing:-0.02em; color:rgba(255,255,255,0.85);
  }
  .s-text strong { color:#00FFFF; font-weight:700; }
  .footer {
    position:absolute; width:936.08px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; gap:21.61px; z-index:2;
  }
  .footer-divider { width:100%; height:1.79px; background:rgba(255,255,255,0.15); }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-pattern"></div>
  <div class="content-group">
    <span class="label-tag">핵심 정리</span>
    <div class="summary-title">지금 기억할 것<br><span class="key">3가지</span></div>
    <div class="summary-list">
      <div class="summary-item">
        <div class="s-num">1</div>
        <div class="s-text">전세가율 기준 <strong>90% → 70%</strong> 하향 검토 중 (아직 확정 아님)</div>
      </div>
      <div class="summary-item">
        <div class="s-num">2</div>
        <div class="s-text">빌라·다세대 임차인, 특히 <strong>청년·사회초년생</strong> 영향 집중 예상</div>
      </div>
      <div class="summary-item">
        <div class="s-num">3</div>
        <div class="s-text">계약 전 <strong>내 집 전세가율 확인</strong>이 더 중요해졌어요</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
