<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    width:597px; height:746px; overflow:hidden; word-break:keep-all;
    position:relative; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background: linear-gradient(160deg, #1a3a5c 0%, #0f2340 50%, #080f1a 100%);
  }
  .overlay {
    position:absolute; bottom:0; left:0; right:0; height:400px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
  }
  .badge {
    position:absolute; top:36px; right:36px;
    background:#ef4452; border-radius:20px;
    padding:7px 18px; font-size:22px; font-weight:700; color:white; letter-spacing:-0.44px;
  }
  .text-area { position:absolute; bottom:76px; left:36px; right:100px; }
  .label { font-size:26px; font-weight:500; color:rgba(255,255,255,0.75); letter-spacing:-0.52px; margin-bottom:10px; }
  .headline { font-size:44px; font-weight:800; color:white; line-height:1.25; letter-spacing:-0.88px; }
  .logo { position:absolute; bottom:40px; right:36px; font-size:22px; font-weight:700; color:rgba(255,255,255,0.5); letter-spacing:-0.44px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="overlay"></div>
  <div class="badge">전세 주거 정보</div>
  <div class="text-area">
    <div class="label">2026년 시행 예정</div>
    <div class="headline">전세보증 문<br>더 좁아진다?<br>청년 세입자<br>영향은?</div>
  </div>
  <div class="logo">고방</div>
</div>
</body>
</html>
