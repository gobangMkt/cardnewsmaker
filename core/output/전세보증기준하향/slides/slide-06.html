<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    width:597px; height:746px; overflow:hidden; word-break:keep-all;
    background:#ffffff; position:relative;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  }
  .content { position:absolute; top:48px; left:40px; right:40px; }
  .body-text { font-size:24px; font-weight:400; color:#1e2124; line-height:1.75; letter-spacing:-0.48px; margin-bottom:24px; }
  .body-text b { font-weight:700; }
  .footer { position:absolute; bottom:0; left:40px; right:40px; height:56px; display:flex; align-items:center; border-top:1px solid #dae2ed; }
  .footer-text { font-size:21px; font-weight:500; color:#1e2124; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content">
    <p class="body-text">
      오늘은 전세보증금 반환보증 기준이 <b>90%에서 70%로 낮아지는</b> 방안에 대해 알아봤는데요. 특히 빌라 등 비아파트 전세에서 영향이 클 것으로 예상돼요.
    </p>
    <p class="body-text">
      현재 고방에선 원룸·쉐어하우스·고시원을 포함한 <b>다양한 주거 유형을 한 번에 확인</b>할 수 있어요.
    </p>
    <p class="body-text">
      만약, 기준 변경 이후 "전세금 수준"보다 <b>"보증 가입 가능성"</b>이 더 중요한 계약 조건이 될 수 있으니, 고방에서 나에게 맞는 새로운 주거 유형을 찾아보세요!
    </p>
  </div>
  <div class="footer"><span class="footer-text">시리즈픽</span></div>
</div>
</body>
</html>
