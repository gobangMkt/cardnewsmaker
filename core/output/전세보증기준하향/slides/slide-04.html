<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    width:597px; height:746px; overflow:hidden; word-break:keep-all;
    background:#f8fafd; position:relative;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  }
  .content { position:absolute; top:64px; left:40px; right:40px; display:flex; flex-direction:column; gap:20px; }
  .headline { display:flex; align-items:center; gap:8px; }
  .icon { font-size:32px; }
  .hl { font-size:32px; font-weight:800; color:#1e2124; letter-spacing:-0.64px; }
  .hl-badge { background:rgba(239,68,82,0.3); border-radius:10px; padding:2px 10px; }
  .img-area {
    width:100%; height:248px; border-radius:14px; overflow:hidden;
    background: linear-gradient(135deg, #1a3050 0%, #2d5986 60%, #1a3050 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  }
  .img-main { font-size:48px; font-weight:800; color:white; letter-spacing:-1px; text-align:center; line-height:1.2; }
  .img-sub { font-size:24px; font-weight:500; color:rgba(255,255,255,0.7); letter-spacing:-0.48px; }
  .group { display:flex; flex-direction:column; gap:10px; }
  .rank-badge {
    display:inline-flex; align-items:center; justify-content:center;
    background:rgba(239,68,82,0.3); border-radius:10px;
    width:45px; height:36px; font-size:22px; font-weight:700; color:#ef4452; flex-shrink:0;
  }
  .group-title { font-size:24px; font-weight:700; color:#1e2124; letter-spacing:-0.48px; }
  ul { list-style:disc; padding-left:28px; display:flex; flex-direction:column; gap:2px; }
  ul li { font-size:24px; font-weight:400; color:#1e2124; letter-spacing:-0.48px; line-height:1.5; }
  .footer { position:absolute; bottom:0; left:40px; right:40px; height:56px; display:flex; align-items:center; border-top:1px solid #dae2ed; }
  .footer-text { font-size:21px; font-weight:500; color:#1e2124; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content">
    <div class="headline">
      <span class="icon">🔥</span>
      <div class="hl">계약 전&nbsp;<span class="hl-badge">체크리스트</span></div>
    </div>
    <div class="img-area">
      <div class="img-main">전세가율<br>70% 확인!</div>
      <div class="img-sub">보증 가입 가능 여부 먼저 체크</div>
    </div>
    <div class="group">
      <div class="rank-badge">필수</div>
      <div class="group-title">계약 전 반드시 확인하세요</div>
      <ul>
        <li>등기부등본에서 선순위 대출(근저당) 확인</li>
        <li>매매가 대비 전세가 비율 직접 계산</li>
        <li>중개사에 전세보증 가입 가능 여부 문의</li>
        <li>보증 어려운 경우 반전세·월세 검토</li>
      </ul>
    </div>
  </div>
  <div class="footer"><span class="footer-text">시리즈픽</span></div>
</div>
</body>
</html>
