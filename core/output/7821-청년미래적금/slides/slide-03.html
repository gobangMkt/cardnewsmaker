<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; align-items:flex-start; gap:43.44px; }
  .headline { display:flex; flex-direction:row; align-items:center; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .hl-text { font-weight:800; font-size:57.61px; line-height:68.78px; letter-spacing:-0.02em; color:#1E2124; }
  .hl-badge { display:inline-flex; align-items:center; justify-content:center; background:rgba(0,154,181,0.2); border-radius:18.1px; padding:0 14.48px; height:68.78px; font-weight:800; font-size:57.61px; letter-spacing:-0.02em; color:#1E2124; line-height:1; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0; }
  .paragraphs { display:flex; flex-direction:column; align-items:flex-start; gap:43.44px; width:936.08px; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:18.1px; width:936.08px; }
  .item-row { display:flex; flex-direction:row; align-items:center; gap:18.1px; width:936.08px; }
  .rank-badge { min-width:81.45px; height:65.16px; background:rgba(0,154,181,0.2); border-radius:18.1px; display:inline-flex; align-items:center; justify-content:center; padding:0 16px; flex-shrink:0; font-weight:700; font-size:43.44px; letter-spacing:-0.02em; color:#1E2124; }
  .group-title { font-weight:700; font-size:43.44px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .body { width:936.08px; font-weight:400; font-size:43.44px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; flex-direction:row; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">📋</div>
      <div class="hl-text">나</div>
      <div class="hl-badge">가입 가능</div>
      <div class="hl-text">할까요?</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraphs">
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">나이</div>
          <div class="group-title">만 19~34세</div>
        </div>
        <div class="body">병역이행자는 병역 기간(최대 6년)을 연령에서 빼줘서, 실제로는 더 <span class="highlight">넓게 적용</span>될 수 있어요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">소득</div>
          <div class="group-title">총급여 7,500만원 이하</div>
        </div>
        <div class="body">종합소득 기준으로는 <span class="highlight">6,300만원 이하</span>도 인정돼요. 소상공인이라면 연 매출 3억원 이하도 가능해요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">가구</div>
          <div class="group-title">가구 중위소득 200% 이하</div>
        </div>
        <div class="body">핵심은 나이만 맞으면 끝이 아니라, 소득 기준과 가구 기준을 <span class="highlight">동시에 충족</span>해야 한다는 점이에요.</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
